name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast — lint, typecheck, unit / smoke-offline tests.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run type-check --if-present || npm run typecheck --if-present || true

      - name: Test
        run: npm run test --if-present

      # Cheap sanity: the e2e script still compiles against the shared fixture.
      - name: Compile e2e scripts
        run: |
          npx tsc --noEmit tests/e2e/mac-app-flow.test.ts \
            --target ES2022 --module ESNext --moduleResolution bundler \
            --strict --skipLibCheck || true

  # Slow — build the Mac app. Only on pushes to main and release tags
  # so PRs don't burn macOS runner minutes. Unsigned; the notarized
  # build happens in provider-dmg.yml (release-only).
  macapp:
    runs-on: macos-14
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/provider
        run: xcodegen generate

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: /tmp/cc-ci-build
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('apps/provider/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Build Release (unsigned)
        working-directory: apps/provider
        run: |
          xcodebuild \
            -project CommonCompute.xcodeproj \
            -scheme CommonCompute \
            -configuration Release \
            -derivedDataPath /tmp/cc-ci-build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Smoke the built app bundle
        run: |
          APP=/tmp/cc-ci-build/Build/Products/Release/CommonCompute.app
          test -d "$APP"
          test -f "$APP/Contents/MacOS/CommonCompute"
          test -f "$APP/Contents/Resources/AppIcon.icns"
          test -d "$APP/Contents/Resources/Fonts"
          echo "App bundle OK."

      - name: Upload unsigned .app for inspection
        uses: actions/upload-artifact@v4
        with:
          name: CommonCompute-unsigned-${{ github.sha }}
          path: /tmp/cc-ci-build/Build/Products/Release/CommonCompute.app
          if-no-files-found: error
          retention-days: 7
