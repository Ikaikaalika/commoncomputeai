name = "commoncompute-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "commoncompute"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "commoncompute-artifacts"

[service_bindings]
ROUTER = { service = "commoncompute-router" }

[vars]
ENVIRONMENT = "staging"
MAX_INPUT_SIZE_MB = "100"

# Secrets (set via `wrangler secret put`):
# JWT_SECRET
# ARGON2_PEPPER
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
