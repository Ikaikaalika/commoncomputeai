name = "commoncompute-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Prod custom domain: api.commoncompute.ai
# Configure once in the Cloudflare dashboard
# (Workers → commoncompute-api → Triggers → Add Custom Domain).
# The Mac app defaults to https://api.commoncompute.ai.

[[d1_databases]]
binding = "DB"
database_name = "commoncompute-v2"
database_id = "b53be441-4a15-48bd-8197-078a4956d5d2"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "commoncompute-artifacts"

# Cloudflare Workers Logs — free, native, no external service.
# JSON lines emitted by the logger middleware show up in the
# Cloudflare dashboard (Workers → commoncompute-api → Logs) and via
# `npx wrangler tail`. ~7 days of retention on free/paid plans.
[observability]
enabled = true
head_sampling_rate = 1

[[services]]
binding = "ROUTER"
service = "commoncompute-router"

# Cloudflare's native rate-limiting binding. 5 registrations per 60s
# per client IP — enough that a friend re-signing up isn't blocked,
# low enough that a drive-by spray hits the 429 quickly.
[[unsafe.bindings]]
name = "RL_REGISTER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[vars]
ENVIRONMENT = "staging"
MAX_INPUT_SIZE_MB = "100"

# Per-environment overrides.
# Deploy prod with:   wrangler deploy --env prod
# Deploy staging with: wrangler deploy --env staging
[env.prod]
# custom_domain = true auto-creates the DNS record that points this
# subdomain at the Worker. No manual zone config required.
workers_dev = true
routes = [
  { pattern = "api.commoncompute.ai", custom_domain = true }
]
d1_databases = [
  { binding = "DB", database_name = "commoncompute-v2", database_id = "b53be441-4a15-48bd-8197-078a4956d5d2", migrations_dir = "migrations" }
]
r2_buckets = [
  { binding = "ARTIFACTS", bucket_name = "commoncompute-artifacts" }
]
services = [
  { binding = "ROUTER", service = "commoncompute-router-prod" }
]
[[env.prod.unsafe.bindings]]
name = "RL_REGISTER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
[env.prod.vars]
ENVIRONMENT = "prod"
MAX_INPUT_SIZE_MB = "100"
[env.prod.observability]
enabled = true

[env.staging.vars]
ENVIRONMENT = "staging"

# Secrets (set once per env via `wrangler secret put --env prod <NAME>`):
# JWT_SECRET
# ARGON2_PEPPER
# STRIPE_SECRET_KEY     (beta)
# STRIPE_WEBHOOK_SECRET (beta)
