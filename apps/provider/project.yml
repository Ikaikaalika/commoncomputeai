name: CommonCompute
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: 14.0
packages: {}
targets:
  CommonCompute:
    type: application
    platform: macOS
    sources:
      - CommonCompute
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.commoncompute.app
      SWIFT_VERSION: 5.9
      CODE_SIGN_STYLE: Automatic
    info:
      path: CommonCompute/Info.plist
      properties:
        CFBundleDisplayName: Common Compute
        LSMinimumSystemVersion: 14.0
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
