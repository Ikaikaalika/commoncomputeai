name: CommonCompute
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: 14.0
packages: {}
targets:
  CommonCompute:
    type: application
    platform: macOS
    sources:
      - path: CommonCompute
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: ai.commoncompute.app
      SWIFT_VERSION: 5.10
      CODE_SIGN_STYLE: Automatic
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_ENTITLEMENTS: CommonCompute/CommonCompute.entitlements
    info:
      path: CommonCompute/Info.plist
      properties:
        CFBundleDisplayName: Common Compute
        LSMinimumSystemVersion: "14.0"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSUIElement: true
