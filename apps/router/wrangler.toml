name = "commoncompute-router"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Router runs as an internal service. api-v2 talks to it via the
# [services] binding in apps/api-v2/wrangler.toml; the router also
# exposes a WebSocket upgrade at /v1/providers/connect that the Mac
# app connects to.
#
# For prod we bind it to router.commoncompute.ai so the ws_url the
# Mac app receives from /v1/providers/enroll is stable. Set once in
# the Cloudflare dashboard.

[[d1_databases]]
binding = "DB"
database_name = "commoncompute-v2"
database_id = "b53be441-4a15-48bd-8197-078a4956d5d2"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "commoncompute-artifacts"

# Cloudflare Workers Logs — free, native, no external service.
[observability]
enabled = true
head_sampling_rate = 1

[durable_objects]
bindings = [
  { name = "ROUTER_SHARD", class_name = "RouterShard" },
  { name = "DEVICE_SESSION", class_name = "DeviceSession" },
]

[[migrations]]
tag = "v1"
new_classes = ["RouterShard", "DeviceSession"]

[vars]
ENVIRONMENT = "staging"

[env.prod]
# custom_domain = true auto-creates the DNS record that points this
# subdomain at the Worker. No manual zone config required.
routes = [
  { pattern = "router.commoncompute.ai", custom_domain = true }
]
d1_databases = [
  { binding = "DB", database_name = "commoncompute-v2", database_id = "b53be441-4a15-48bd-8197-078a4956d5d2", migrations_dir = "migrations" }
]
r2_buckets = [
  { binding = "ARTIFACTS", bucket_name = "commoncompute-artifacts" }
]
[env.prod.durable_objects]
bindings = [
  { name = "ROUTER_SHARD", class_name = "RouterShard" },
  { name = "DEVICE_SESSION", class_name = "DeviceSession" },
]
[[env.prod.migrations]]
tag = "v1"
new_classes = ["RouterShard", "DeviceSession"]
[env.prod.vars]
ENVIRONMENT = "prod"
[env.prod.observability]
enabled = true

[env.staging.vars]
ENVIRONMENT = "staging"

# Secrets (set once per env via `wrangler secret put --env prod <NAME>`):
# JWT_SECRET
# ARGON2_PEPPER
